name: Build and Publish

on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.compare.outputs.build_needed }}
      tag: ${{ steps.mihomo.outputs.tag }}

    steps:
      - uses: actions/checkout@v6

      - name: Get latest mihomo release
        id: mihomo
        run: |
          TAG=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get my latest release
        id: mine
        run: |
          TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            TAG="none"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare versions
        id: compare
        run: |
          MIHOMO="${{ steps.mihomo.outputs.tag }}"
          MINE="${{ steps.mine.outputs.tag }}"

          echo "mihomo: $MIHOMO"
          echo "mine: $MINE"

          BASE=$(echo "$MINE" | sed 's/-mihomo-proxy-ros//')

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$MIHOMO" = "$BASE" ]; then
            echo "Already latest"
            echo "build_needed=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected"
            echo "build_needed=true" >> $GITHUB_OUTPUT
          fi

  release-build:
    needs: release-check
    if: needs.release-check.outputs.build_needed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: amd64
            variant: ""
            amd64: v1
            name: amd64-v1

          - arch: amd64
            variant: ""
            amd64: v2
            name: amd64-v2

          - arch: amd64
            variant: ""
            amd64: v3
            name: amd64-v3

          - arch: amd64
            variant: ""
            amd64: v4
            name: amd64-v4

          - arch: arm64
            variant: ""
            amd64: ""
            name: arm64

          - arch: arm
            variant: v7
            amd64: ""
            name: armv7

          - arch: arm
            variant: v5
            amd64: ""
            name: armv5

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build
        run: |
          docker buildx build \
            -f Dockerfile-release \
            --platform linux/${{ matrix.arch }}${{ matrix.variant && format('/{0}', matrix.variant) || '' }} \
            --build-arg TAG=${{ needs.release-check.outputs.tag }} \
            --build-arg AMD64VERSION=${{ matrix.amd64 }} \
            --build-arg BUILDTIME="$(date)" \
            --output type=local,dest=out \
            .

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          TAG="${{ needs.release-check.outputs.tag }}"
          BASENAME="mihomo-linux-${{ matrix.name }}"
          ARCHIVE="${BASENAME}-${TAG}.gz"

          cp out/mihomo "dist/${BASENAME}"
          gzip -c "dist/${BASENAME}" > "dist/${ARCHIVE}"
          rm -f "dist/${BASENAME}"

          sha256sum "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.name }}
          path: dist/*

  release-publish:
    needs: [release-check, release-build]
    if: needs.release-check.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;

      - name: Add version.txt
        run: |
          echo "${{ needs.release-check.outputs.tag }}" > release/version.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-check.outputs.tag }}
          name: Mihomo Proxy ROS ${{ needs.release-check.outputs.tag }}
          files: release/*

  check-and-build:
    needs: [release-check, release-build, release-publish]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PACKAGE_OWNER: medium1992
      PACKAGE_NAME: mihomo-proxy-ros
      PACKAGE_NAME_ENCODED: mihomo-proxy-ros
      DELETE_UNTAGGED: "true"

    steps:
      - name: Install jq and crane
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz | sudo tar -C /usr/local/bin -xz crane
          chmod +x /usr/local/bin/crane
          crane version || { echo "Crane failed to install"; exit 1; }

      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Get latest versions
        id: latest_versions
        run: |
          MIHOMO=$(curl -s https://api.github.com/repos/medium1992/mihomo-proxy-ros/releases/latest | jq -r '.tag_name')
          HS5T=$(curl -s https://api.github.com/repos/heiher/hev-socks5-tunnel/releases/latest | jq -r '.tag_name')
          BYEDPI=$(curl -s https://api.github.com/repos/hufrea/byedpi/releases/latest | jq -r '.tag_name')
          ZAPRET=$(curl -s https://api.github.com/repos/bol-van/zapret/releases/latest | jq -r '.tag_name')
          ZAPRET2=$(curl -s https://api.github.com/repos/bol-van/zapret2/releases/latest | jq -r '.tag_name')
          echo "mihomo=$MIHOMO" >> $GITHUB_ENV
          echo "hev_socks5_tunnel=$HS5T" >> $GITHUB_ENV
          echo "byedpi=$BYEDPI" >> $GITHUB_ENV
          echo "zapret=$ZAPRET" >> $GITHUB_ENV
          echo "zapret2=$ZAPRET2" >> $GITHUB_ENV
      
      - name: Compare with VERSIONS
        id: check_versions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run → force build"
            echo "build_needed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ ! -f VERSIONS ]; then
            echo "No VERSIONS file, need build"
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            NEED_BUILD=false
            while IFS='=' read -r name version; do
              LATEST=${!name}
              if [ "$LATEST" != "$version" ]; then
                NEED_BUILD=true
                break
              fi
            done < VERSIONS
            echo "build_needed=$NEED_BUILD" >> $GITHUB_OUTPUT
          fi
      
      - name: Update VERSIONS
        if: steps.check_versions.outputs.build_needed == 'true'
        run: |
          echo "mihomo=${{ env.mihomo }}" > VERSIONS
          echo "hev_socks5_tunnel=${{ env.hev_socks5_tunnel }}" >> VERSIONS
          echo "byedpi=${{ env.byedpi }}" >> VERSIONS
          echo "zapret=${{ env.zapret }}" >> VERSIONS
          echo "zapret2=${{ env.zapret2 }}" >> VERSIONS

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Login to GitHub Container Registry
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          echo "BUILDTIME=$(date)" >> $GITHUB_ENV

      - name: Build and push amd64v1
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            AMD64VERSION=v1
          secrets: |
            "awg=${{ secrets.AWG }}"
          tags: |
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v1-${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v1-${{ env.mihomo }}
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v1
            medium1992/mihomo-proxy-ros:amd64v1-${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            medium1992/mihomo-proxy-ros:amd64v1-${{ env.mihomo }}
            medium1992/mihomo-proxy-ros:amd64v1
 
      - name: Build and push amd64v2
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            AMD64VERSION=v2
          secrets: |
            "awg=${{ secrets.AWG }}"
          tags: |
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v2-${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v2-${{ env.mihomo }}
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v2
            medium1992/mihomo-proxy-ros:amd64v2-${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            medium1992/mihomo-proxy-ros:amd64v2-${{ env.mihomo }}
            medium1992/mihomo-proxy-ros:amd64v2

      - name: Build and push amd64v4
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            AMD64VERSION=v4
          secrets: |
            "awg=${{ secrets.AWG }}"
          tags: |
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v4-${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v4-${{ env.mihomo }}
            ghcr.io/medium1992/mihomo-proxy-ros:amd64v4
            medium1992/mihomo-proxy-ros:amd64v4-${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            medium1992/mihomo-proxy-ros:amd64v4-${{ env.mihomo }}
            medium1992/mihomo-proxy-ros:amd64v4

      - name: Build and push multi-arch
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v5
          push: true
          build-args: |
            AMD64VERSION=v3
          secrets: |
            "awg=${{ secrets.AWG }}"
          tags: |
            ghcr.io/medium1992/mihomo-proxy-ros:${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            ghcr.io/medium1992/mihomo-proxy-ros:${{ env.mihomo }}
            ghcr.io/medium1992/mihomo-proxy-ros:latest
            medium1992/mihomo-proxy-ros:${{ env.mihomo }}-${{ env.hev_socks5_tunnel }}-${{ env.byedpi }}-${{ env.zapret }}-${{ env.zapret2 }}
            medium1992/mihomo-proxy-ros:${{ env.mihomo }}
            medium1992/mihomo-proxy-ros:latest

      - name: Publish container archives to Telegram
        if: steps.check_versions.outputs.build_needed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          IMAGE_REPO: medium1992/mihomo-proxy-ros
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured, skipping Telegram publish."
            exit 0
          fi

          telegram_api() {
            local method="$1"
            shift

            response=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/${method}" "$@")
            echo "$response" | grep -q '"ok":true' || {
              echo "Telegram API call failed:"
              echo "$response"
              exit 1
            }
          }

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              "$@" && return 0
              echo "Attempt ${attempt} failed, retrying..."
              sleep 10
            done
            "$@"
          }

          thread_data_args=()
          thread_form_args=()
          if [ -n "${TELEGRAM_THREAD_ID}" ]; then
            thread_data_args=(-d "message_thread_id=${TELEGRAM_THREAD_ID}")
            thread_form_args=(-F "message_thread_id=${TELEGRAM_THREAD_ID}")
          fi

          mkdir -p telegram-images

          export_image() {
            local name="$1"
            local platform="$2"
            local image="$3"
            local file="telegram-images/mihomo-proxy-ros-${name}-${mihomo}.tar.gz"

            retry docker pull --platform "${platform}" "${image}"
            docker save "${image}" | gzip -9 > "${file}"
            docker image rm "${image}" || true
          }

          export_image "amd64-v1" "linux/amd64" "${IMAGE_REPO}:amd64v1-${mihomo}"
          export_image "amd64-v2" "linux/amd64" "${IMAGE_REPO}:amd64v2-${mihomo}"
          export_image "amd64-v3" "linux/amd64" "${IMAGE_REPO}:${mihomo}"
          export_image "amd64-v4" "linux/amd64" "${IMAGE_REPO}:amd64v4-${mihomo}"
          export_image "arm64" "linux/arm64" "${IMAGE_REPO}:${mihomo}"
          export_image "armv7" "linux/arm/v7" "${IMAGE_REPO}:${mihomo}"
          export_image "armv5" "linux/arm/v5" "${IMAGE_REPO}:${mihomo}"

          sha256sum telegram-images/*.tar.gz > telegram-images/sha256sums.txt

          files_list=$(find telegram-images -maxdepth 1 -name '*.tar.gz' -type f -printf '%f\n' | sort)
          message=$(printf 'Mihomo Proxy ROS container images\n\nmihomo: %s\nhev-socks5-tunnel: %s\nbyedpi: %s\nzapret: %s\nzapret2: %s\n\nDocker Hub: https://hub.docker.com/r/%s\n\nFiles:\n%s\n\nChecksums: sha256sums.txt' \
            "${mihomo}" \
            "${hev_socks5_tunnel}" \
            "${byedpi}" \
            "${zapret}" \
            "${zapret2}" \
            "${IMAGE_REPO}" \
            "${files_list}")

          telegram_api sendMessage \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            "${thread_data_args[@]}" \
            --data-urlencode "text=${message}"

          while IFS= read -r file; do
            telegram_api sendDocument \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              "${thread_form_args[@]}" \
              -F "document=@${file}" \
              -F "caption=$(basename "$file")"
          done < <(find telegram-images -maxdepth 1 -name '*.tar.gz' -type f | sort)

          telegram_api sendDocument \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            "${thread_form_args[@]}" \
            -F "document=@telegram-images/sha256sums.txt" \
            -F "caption=sha256sums.txt"
          
      - name: Commit and push VERSIONS
        if: steps.check_versions.outputs.build_needed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add VERSIONS
          git commit -m "Auto-update: VERSIONS" || exit 0
          git push

      - name: Log in to GHCR with crane
        if: steps.check_versions.outputs.build_needed == 'true'
        run: echo "${GITHUB_TOKEN}" | crane auth login ghcr.io -u ${PACKAGE_OWNER} --password-stdin

      - name: Analyze GHCR packages (dry-run)
        if: steps.check_versions.outputs.build_needed == 'true'
        id: analyze
        run: |
          set -e

          echo "Fetching package versions for ${PACKAGE_OWNER}/${PACKAGE_NAME}..."
          page=1
          packages_json="[]"
          last_first_id=""
          while true; do
            echo "Fetching page $page..."
            chunk=$(timeout 30s gh api -H "Accept: application/vnd.github+json" \
              /users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions?per_page=100&page=$page || echo "TIMEOUT")
            if [[ "$chunk" == "TIMEOUT" ]]; then
              echo "Error: gh api timed out on page $page"
              exit 1
            fi
            echo "Page $page raw chunk: ${chunk:0:50}..."
            chunk_count=$(echo "$chunk" | jq length)
            echo "Page $page: $chunk_count versions"
            if [[ "$chunk_count" -eq 0 ]]; then
              echo "No more versions on page $page (empty response)"
              break
            fi
            first_id=$(echo "$chunk" | jq -r '.[0].id // ""')
            if [[ -n "$last_first_id" && "$first_id" == "$last_first_id" ]]; then
              echo "Page $page has same data as previous (ID: $first_id), stopping"
              break
            fi
            last_first_id="$first_id"
            if [[ "$packages_json" == "[]" ]]; then
              packages_json="$chunk"
            else
              packages_json=$(jq -s '.[0] + .[1]' <(echo "$packages_json") <(echo "$chunk"))
            fi
            ((page++))
            if [[ $page -gt 10 ]]; then
              echo "Reached max page limit (10)"
              break
            fi
          done

          total=$(echo "$packages_json" | jq length)
          echo "Total versions found: $total (pages processed: $((page-1)))"
          echo ""

          declare -A protected_digests
          declare -A child_digests
          declare -A manifest_ids

          echo "=== 🏷️ Tagged manifests ==="
          for row in $(echo "$packages_json" | jq -r '.[] | select(.metadata.container.tags | length > 0) | @base64'); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }
            id=$(_jq '.id')
            digest=$(_jq '.name')
            tags=$(_jq '.metadata.container.tags | join(", ")')
            created=$(_jq '.created_at')
            mediaType=$(_jq '.metadata.container.manifest.mediaType // "unknown"')
            manifest_ids[$id]=1
            protected_digests[$digest]=1
            echo "  📦 Inspecting manifest for tags: [$tags]"
            for tag in $(_jq '.metadata.container.tags[]' | sort -u); do
              manifest_json=$(timeout 10s crane manifest ghcr.io/${PACKAGE_OWNER}/${PACKAGE_NAME}:${tag} 2>/dev/null || echo "{}")
              sub_digests=$(echo "$manifest_json" | jq -r '.manifests[].digest // empty')
              for sd in $sub_digests; do
                if [[ -n "$sd" ]]; then
                  child_digests[$sd]=1
                  protected_digests[$sd]=1
                  echo "    → Protected child digest: $sd"
                fi
              done
            done
            echo "- ID: $id | Digest: $digest | Tags: [$tags] | Created: $created | Type: manifest ($mediaType)"
          done

          echo ""
          echo "Protected child digests count: ${#child_digests[@]}"
          echo ""

          echo "=== 🧩 Untagged images ==="
          untagged_ids=()
          for id in $(echo "$packages_json" | jq -r '.[] | select(.metadata.container.tags | length == 0) | .id'); do
            untagged_ids+=("$id")
          done
          safe_untagged_ids=()

          for id in "${untagged_ids[@]}"; do
            data=$(timeout 10s gh api -H "Accept: application/vnd.github+json" \
              /users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions/$id || echo "{}")
            digest=$(echo "$data" | jq -r '.name // "unknown"')
            created=$(echo "$data" | jq -r '.created_at // "unknown"')
            mediaType=$(echo "$data" | jq -r '.metadata.container.manifest.mediaType // "unknown"')
            if [[ "$digest" == "unknown" ]]; then
              echo "Error: Failed to fetch data for ID $id (possibly already deleted)"
              continue
            fi
            if [[ -n "${child_digests[$digest]}" || -n "${protected_digests[$digest]}" ]]; then
              echo "- ID: $id | Digest: $digest | Created: $created | Type: $mediaType → 🛡 пропущен (child or referenced)"
            else
              echo "- ID: $id | Digest: $digest | Created: $created | Type: $mediaType → 🧹 кандидат на удаление"
              safe_untagged_ids+=("$id")
            fi
          done

          echo ""
          echo "Safe untagged IDs (before validation): ${safe_untagged_ids[*]}"
          validated_ids=()
          for id in "${safe_untagged_ids[@]}"; do
            if gh api -H "Accept: application/vnd.github+json" \
              /users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions/$id >/dev/null 2>&1; then
              validated_ids+=("$id")
              echo "Version $id exists, added to deletion list"
            else
              echo "Version $id not found, skipping"
            fi
          done

          echo ""
          echo "Validated untagged IDs: ${validated_ids[*]}"
          if [ ${#validated_ids[@]} -eq 0 ]; then
            echo "No valid untagged IDs to delete"
            echo "safe_untagged_ids_comma=" >> $GITHUB_OUTPUT
          else
            safe_untagged_ids_comma=$(echo "${validated_ids[*]}" | tr ' ' ', ')
            echo "safe_untagged_ids_comma=$safe_untagged_ids_comma" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup untagged GHCR versions
        if: env.DELETE_UNTAGGED == 'true' && steps.analyze.outputs.safe_untagged_ids_comma != ''
        uses: actions/delete-package-versions@v5
        with:
          package-name: '${{ env.PACKAGE_NAME }}'
          package-type: 'container'
          package-version-ids: '${{ steps.analyze.outputs.safe_untagged_ids_comma }}'
          token: ${{ env.GITHUB_TOKEN }}
