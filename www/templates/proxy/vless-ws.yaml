proxies:
  - name: vless-ws-example
    type: vless
    server: server.example.com
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    network: ws
    udp: true
    tls: true
    servername: server.example.com
    client-fingerprint: chrome
    ws-opts:
      path: /ws
      headers:
        Host: server.example.com
