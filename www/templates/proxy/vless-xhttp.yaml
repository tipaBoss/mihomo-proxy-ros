proxies:
  - name: vless-xhttp-example
    type: vless
    server: server.example.com
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    network: xhttp
    udp: true
    tls: true
    servername: server.example.com
    client-fingerprint: chrome
    xhttp-opts:
      mode: auto
      path: /xhttp
      host: server.example.com
    reality-opts:
      public-key: <reality public key>
      short-id: <short id>
