[Interface]
# Базовые параметры WireGuard
PrivateKey = <client private key, base64>
Address = 10.0.0.2/32
DNS = 1.1.1.1, 1.0.0.1
MTU = 1408

# AmneziaWG обфускация — удалите блок, если используете обычный WireGuard
Jc = 4
Jmin = 40
Jmax = 70
S1 = 50
S2 = 100
S3 = 0
S4 = 0
H1 = 1
H2 = 2
H3 = 3
H4 = 4
I1 = <hex string>
I2 = <hex string>
I3 = <hex string>
I4 = <hex string>
I5 = <hex string>
J1 = 0
J2 = 0
J3 = 0
ITime = 0

[Peer]
PublicKey = <server public key, base64>
PresharedKey = <preshared key, base64>
Endpoint = server.example.com:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25

# Параметры, специфичные для адаптера mihomo (читаются парсером по имени,
# секция произвольная — entrypoint игнорирует [Interface]/[Peer]/[Mihomo]).
[Mihomo]
# Имя другого proxy в конфиге, через который пойдёт исходящее соединение.
DialerProxy =
# Резолвить DNS удалённой стороной (true) или локально (false).
RemoteDnsResolve = false
# Кол-во worker-потоков (по умолчанию авто).
Workers =
# Reserved bytes для WireGuard (3 байта через запятую, например 0,0,0).
Reserved =
